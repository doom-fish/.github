<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 44" width="960" height="44"
     role="img" aria-label="doom-fish — sketchybar-style status bar">
  <title>doom-fish</title>
  <style>
    .bg   { fill: #0a0a0a; }
    .hair { fill: #1a1a1a; }
    .chip { fill: #141414; stroke: #262626; stroke-width: 1; }
    .act  { fill: #e10600; }
    .ink  { fill: #e6e6e6; }
    .accent { fill: #e10600; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
            font-size: 12px; font-weight: 600; letter-spacing: 0.04em; }
    .small { font-size: 10px; }
  </style>

  <rect class="bg"   width="960" height="44"/>
  <rect class="hair" width="960" height="1" y="43"/>

  <!-- ===== Brand ===== -->
  <g transform="translate(8 8)">
    <rect class="chip" width="138" height="28"/>
    <g transform="translate(16 14)" stroke="#e10600" stroke-width="1.4" fill="none"
       stroke-linejoin="round">
      <path d="M0,9 L-8.5,-2.9 L8.6,4.6 L-8.6,4.6 L8.5,-2.9 Z"/>
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="3s"
               repeatCount="indefinite"/>
    </g>
    <text class="mono ink" x="34" y="19">doom-fish</text>
  </g>

  <!-- ===== Workspaces 1..5 (active cycles, period 5s) ===== -->
  <g transform="translate(154 8)" class="mono">
    <g class="chip">
      <rect x="0"   width="28" height="28"/>
      <rect x="32"  width="28" height="28"/>
      <rect x="64"  width="28" height="28"/>
      <rect x="96"  width="28" height="28"/>
      <rect x="128" width="28" height="28"/>
    </g>
    <g class="act">
      <rect x="0"   width="28" height="28" opacity="0">
        <animate attributeName="opacity" values="1;0" keyTimes="0;0.2"
                 dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      <rect x="32"  width="28" height="28" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.2;0.4"
                 dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      <rect x="64"  width="28" height="28" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.4;0.6"
                 dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      <rect x="96"  width="28" height="28" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.6;0.8"
                 dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      <rect x="128" width="28" height="28" opacity="0">
        <animate attributeName="opacity" values="0;1" keyTimes="0;0.8"
                 dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </g>
    <g text-anchor="middle">
      <text x="14"  y="19" fill="#0a0a0a">1
        <animate attributeName="fill" values="#0a0a0a;#e6e6e6"
                 keyTimes="0;0.2" dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </text>
      <text x="46"  y="19" fill="#e6e6e6">2
        <animate attributeName="fill" values="#e6e6e6;#0a0a0a;#e6e6e6"
                 keyTimes="0;0.2;0.4" dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </text>
      <text x="78"  y="19" fill="#e6e6e6">3
        <animate attributeName="fill" values="#e6e6e6;#0a0a0a;#e6e6e6"
                 keyTimes="0;0.4;0.6" dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </text>
      <text x="110" y="19" fill="#e6e6e6">4
        <animate attributeName="fill" values="#e6e6e6;#0a0a0a;#e6e6e6"
                 keyTimes="0;0.6;0.8" dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </text>
      <text x="142" y="19" fill="#e6e6e6">5
        <animate attributeName="fill" values="#e6e6e6;#0a0a0a"
                 keyTimes="0;0.8" dur="5s" repeatCount="indefinite" calcMode="discrete"/>
      </text>
    </g>
  </g>

  <!-- ===== Active window / focused app (cycles) ===== -->
  <g transform="translate(322 8)" class="mono">
    <rect class="chip" width="200" height="28"/>
    <g transform="translate(10 19)">
      <text class="ink">
        <tspan>~/dev/cidre</tspan>
        <animate attributeName="opacity" values="1;1;0;0;0"
                 keyTimes="0;0.33;0.34;0.99;1"
                 dur="9s" repeatCount="indefinite"/>
      </text>
      <text class="ink" opacity="0">cargo build --release
        <animate attributeName="opacity" values="0;0;1;1;0"
                 keyTimes="0;0.33;0.34;0.66;0.67"
                 dur="9s" repeatCount="indefinite"/>
      </text>
      <text class="ink" opacity="0">vim foundation-models/lib.rs
        <animate attributeName="opacity" values="0;0;1;1"
                 keyTimes="0;0.66;0.67;1"
                 dur="9s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- ===== Clock (center) ===== -->
  <g transform="translate(612 8)" class="mono">
    <rect class="chip" width="88" height="28"/>
    <g transform="translate(13 14)" stroke="#e10600" stroke-width="1.2" fill="none"
       stroke-linecap="round">
      <circle r="6"/>
      <path d="M0,0 L0,-3.5 M0,0 L3.5,1"/>
    </g>
    <g text-anchor="middle">
      <text x="52" y="19" class="ink">
        <tspan>13:37</tspan>
        <animate attributeName="opacity" values="1;1;0;0;0"
                 keyTimes="0;0.33;0.34;0.99;1"
                 dur="6s" repeatCount="indefinite"/>
      </text>
      <text x="52" y="19" class="ink" opacity="0">23:23
        <animate attributeName="opacity" values="0;0;1;1;0"
                 keyTimes="0;0.33;0.34;0.66;0.67"
                 dur="6s" repeatCount="indefinite"/>
      </text>
      <text x="52" y="19" class="ink" opacity="0">03:33
        <animate attributeName="opacity" values="0;0;1;1"
                 keyTimes="0;0.66;0.67;1"
                 dur="6s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- ===== CPU sparkline ===== -->
  <g transform="translate(704 8)" class="mono">
    <rect class="chip" width="64" height="28"/>
    <g class="accent">
      <rect x="6"  width="3" y="24" height="2">
        <animate attributeName="height" values="2;14;6;10;4;12;2"
                 dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="24;12;20;16;22;14;24"
                 dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="11" width="3" y="18" height="8">
        <animate attributeName="height" values="8;3;12;6;14;4;8"
                 dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="18;23;14;20;12;22;18"
                 dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="16" width="3" y="20" height="6">
        <animate attributeName="height" values="6;10;3;14;8;4;6"
                 dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="20;16;23;12;18;22;20"
                 dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="21" width="3" y="16" height="10">
        <animate attributeName="height" values="10;4;12;6;3;14;10"
                 dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="16;22;14;20;23;12;16"
                 dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="34" y="20" class="small ink">cpu</text>
  </g>

  <!-- ===== Battery ===== -->
  <g transform="translate(772 8)" class="mono">
    <rect class="chip" width="76" height="28"/>
    <g transform="translate(11 14)">
      <rect x="-7" y="-4" width="14" height="8" fill="none" stroke="#e6e6e6"/>
      <rect x="7"  y="-2" width="2"  height="4" fill="#e6e6e6"/>
      <rect x="-6" y="-3" width="12" height="6" class="accent">
        <animate attributeName="width"
                 values="12;1;12"
                 dur="9s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="48" y="20" text-anchor="middle" class="small ink">
      <tspan>66%</tspan>
    </text>
  </g>

  <!-- ===== Wifi ===== -->
  <g transform="translate(852 8)">
    <rect class="chip" width="32" height="28"/>
    <g transform="translate(16 19)" stroke="#e10600" stroke-width="1.6" fill="none"
       stroke-linecap="round">
      <path d="M-7,-4 A7,7 0 0 1 7,-4">
        <animate attributeName="stroke-opacity" values="0.25;1;0.25"
                 dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
      </path>
      <path d="M-4.5,-2 A4.5,4.5 0 0 1 4.5,-2">
        <animate attributeName="stroke-opacity" values="0.25;1;0.25"
                 dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
      </path>
      <path d="M-2,0 A2,2 0 0 1 2,0"/>
      <circle cx="0" cy="0.5" r="1" fill="#e10600" stroke="none"/>
    </g>
  </g>

  <!-- ===== Right-most: rust crate count chip ===== -->
  <g transform="translate(888 8)" class="mono">
    <rect class="chip" width="64" height="28"/>
    <text x="32" y="19" text-anchor="middle" class="ink">v0.1</text>
  </g>
</svg>
