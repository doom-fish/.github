<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"
     role="img" aria-label="doom-fish — Sigil of Baphomet">
  <title>doom-fish</title>

  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">

    <!-- Double ring -->
    <g fill="none" stroke="#c1121f" stroke-width="5">
      <circle cx="256" cy="256" r="245"/>
      <circle cx="256" cy="256" r="215"/>
    </g>

    <!-- Inverted pentagram, vertex tips touch the inner ring (r=215) -->
    <path d="M256,471 L382.4,82.1 L51.5,322.4 L460.5,322.4 L129.6,82.1 Z"
          fill="none" stroke="#c1121f" stroke-width="5" stroke-linejoin="miter"/>

    <!-- Hebrew Leviathan letters (לויתן) — counter-clockwise from bottom point -->
    <g fill="#c1121f" text-anchor="middle"
       font-family="'Times New Roman', Times, 'David', 'Adobe Hebrew', 'Arial Hebrew', 'Geeza Pro', serif"
       font-size="34" font-weight="700">
      <text x="256"   y="498">&#1500;</text>
      <text x="474.8" y="339">&#1493;</text>
      <text x="391.2" y="82">&#1497;</text>
      <text x="120.8" y="82">&#1514;</text>
      <text x="37.2"  y="339">&#1503;</text>
    </g>

    <!-- ===== Goat head (Baphomet) ===== -->

    <!-- Horns: thick curved shapes from forehead to upper pentagram points -->
    <g fill="#c1121f">
      <path d="M 218,178
               C 188,150 150,118 129.6,82.1
               C 158,140 192,178 230,200 Z"/>
      <path d="M 294,178
               C 324,150 362,118 382.4,82.1
               C 354,140 320,178 282,200 Z"/>
      <g fill="none" stroke="#0a0101" stroke-width="2" stroke-linecap="round">
        <path d="M 165,128 Q 178,138 188,156"/>
        <path d="M 192,98  Q 200,108 208,126"/>
        <path d="M 347,128 Q 334,138 324,156"/>
        <path d="M 320,98  Q 312,108 304,126"/>
      </g>
    </g>

    <!-- Ears: sharp triangles extending to side pentagram points -->
    <g fill="#c1121f">
      <path d="M 322,238 L 460.5,322.4 L 308,272 Z"/>
      <path d="M 190,238 L 51.5,322.4 L 204,272 Z"/>
    </g>

    <!-- Beard / goatee → V0 (256, 471) -->
    <path d="M 222,318
             Q 226,360 256,471
             Q 286,360 290,318
             Q 256,338 222,318 Z"
          fill="#c1121f"/>

    <!-- Face inner outline -->
    <path d="M 222,200
             Q 256,210 290,200
             L 322,238
             L 304,300
             Q 256,330 208,300
             L 190,238 Z"
          fill="none" stroke="#c1121f" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Eyes (devil-slit, angled outward) -->
    <g>
      <ellipse cx="227" cy="245" rx="22" ry="9" transform="rotate(12 227 245)" fill="#f7e7c4"/>
      <ellipse cx="285" cy="245" rx="22" ry="9" transform="rotate(-12 285 245)" fill="#f7e7c4"/>
      <ellipse cx="227" cy="245" rx="3" ry="7" transform="rotate(12 227 245)" fill="#0a0101"/>
      <ellipse cx="285" cy="245" rx="3" ry="7" transform="rotate(-12 285 245)" fill="#0a0101"/>
    </g>

    <!-- Nose -->
    <path d="M 248,268 L 264,268 L 256,290 Z" fill="#c1121f"/>

    <!-- Snout / mouth -->
    <path d="M 232,302 Q 244,316 256,308 Q 268,316 280,302"
          fill="none" stroke="#c1121f" stroke-width="2.5" stroke-linecap="round"/>

  </g>
</svg>
